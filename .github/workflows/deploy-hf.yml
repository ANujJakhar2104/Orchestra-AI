name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'data/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'README.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push only backend files to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Sirf backend files wala clean folder banao
          mkdir hf-deploy
          cp -r app hf-deploy/
          cp requirements.txt hf-deploy/
          cp Dockerfile hf-deploy/
          cp README.md hf-deploy/
          [ -d data ] && cp -r data hf-deploy/ || true

          # Us folder ko git repo banao aur push karo
          cd hf-deploy
          git init
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "deploy: ${{ github.sha }}"
          git push https://jakharanuj:${HF_TOKEN}@huggingface.co/spaces/jakharanuj/orchestra-ai-backend main --force
